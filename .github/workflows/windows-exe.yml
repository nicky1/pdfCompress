# 在 GitHub 云端 Windows 环境构建打包：pdf_compress.exe + Ghostscript（强压缩模式可直接用）。
# 使用方式：把本仓库推到 GitHub → 打开 Actions → 选择 “Build Windows exe” → 进入最新一次运行 → 下载 Artifacts 的 zip 并解压后直接运行。
# 本地电脑无需安装 CMake / vcpkg / Ghostscript；仅需浏览器下载产物（首次编译约数分钟，请等待工作流完成）。
name: Build Windows exe

on:
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_TRIPLET: x64-windows-static

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone and bootstrap vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics

      - name: Configure (Release, static)
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
             -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Install Ghostscript
        shell: pwsh
        run: choco install ghostscript -y

      - name: Bundle exe with Ghostscript
        shell: pwsh
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist/pdf_compress-windows-x64"
          $gsOut = Join-Path $dist "tools/ghostscript"
          New-Item -ItemType Directory -Path $dist -Force | Out-Null
          New-Item -ItemType Directory -Path $gsOut -Force | Out-Null
          Copy-Item "build/Release/pdf_compress.exe" $dist -Force

          $gsExe = (Get-Command gswin64c.exe -ErrorAction SilentlyContinue).Source
          if (-not $gsExe) {
            $gsExe = (Get-Command gswin32c.exe -ErrorAction SilentlyContinue).Source
          }
          if (-not $gsExe) {
            throw "Ghostscript executable not found after installation."
          }
          $gsRoot = Split-Path (Split-Path $gsExe -Parent) -Parent
          Copy-Item $gsRoot $gsOut -Recurse -Force

      - name: Upload bundled package
        uses: actions/upload-artifact@v4
        with:
          name: pdf_compress-windows-x64
          path: dist/pdf_compress-windows-x64
